<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">


  <title>Frontend Mentor | FX Checker</title>
</head>
<body>
  <div class = "app">
    <div class="topbar">
      <div class="brand"> <span class="mark"></span> FX Checker
      </div>
      <div class = "meta"> <b>55</b>CURRENCIES & nbsp; &nbsp EOD &;</div>
    </div>

    <div class="ticker" id="ticker"></div>
    <div class="main">
      <div class="section-title">CHECK THE RATE</div>
      <div class="convert-card">
        <div class="field">
          <label>SEND</label>
          <div class="field-row">
            <input id="sendinput" type="text" inputmode="decimal" value="1000">
            <div class="currency-pill" id="sendCcy"><span class="flag">🇺🇸</span> USD <span></span>
            </div>
          </div>
        </div>
      </div>
    </div>
     <div class="swap-btn" id="swapBtn" title="Swap currencies"></div>
    <div class="field">
      <label>RECEIVE</label>
      <div class="field-row">
        <input id="receiveinput" type="text" inputmode="decimal" value="1000">
        <div class="currency-pill" id="receiveCcy"><span class="flag">🇪🇺</span> EUR <span></span>
        </div>
      </div>
    </div>

<div class="rate-row">
  <div id="rateText"> 1 USD =  0.85 EUR</div>
  <div class="rate-actions"> <div class="btn btn-fav" id="fav-btn"> FAVORITED</div> 
  <div class="btn btn-long" id="long-btn"> LOG CONVERSION</div>
  </div> 
</div>














































  </div>
<!--
  This file holds the static written content from the design so you don't have to
  retype it. It is intentionally unstructured — building the HTML is your job.

  Notes labelled "Dynamic:" mark content pulled in with JavaScript — live exchange
  rates, or the pairs and conversions you save in the browser. Text in [square
  brackets] is a live value that sits inside otherwise-static copy.

  Labels are written in normal case even though the design shows many of them in
  uppercase. Apply that uppercase look with CSS (text-transform: uppercase) rather
  than capital letters in the markup — all-caps text can be read out awkwardly by
  some screen readers. Acronyms and codes (FX, EOD, ECB, USD, EUR…) stay as-is.
-->


</body>
</html>
